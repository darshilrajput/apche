<!DOCTYPE html>
<html>
<head>
<title>Tap The Ball Game</title>
<style>
    body{
        text-align:center;
        font-family:Arial;
        background:#222;
        color:white;
    }

    #gameArea{
        width:90%;
        height:400px;
        background:#444;
        margin:auto;
        position:relative;
        border-radius:10px;
        overflow:hidden;
    }

    #ball{
        width:60px;
        height:60px;
        background:red;
        border-radius:50%;
        position:absolute;
    }

    h1{
        margin-top:20px;
    }
</style>
</head>

<body>

<h1>Tap The Ball 🎮</h1>
<h2>Score: <span id="score">0</span></h2>

<div id="gameArea">
    <div id="ball"></div>
</div>

<script>

let ball = document.getElementById("ball");
let score = 0;

function moveBall(){
    let x = Math.random()*300;
    let y = Math.random()*300;

    ball.style.left = x + "px";
    ball.style.top = y + "px";
}

ball.addEventListener("click", function(){
    score++;
    document.getElementById("score").innerText = score;
    moveBall();
});

moveBall();

</script>

</body>
</html>>>
